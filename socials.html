<!DOCTYPE html>
<html>
<head>
    <title>Devlogs | Osaid Hassan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/home icon.png">
    <style>
        .anim {
            opacity: 0;
            filter: blur(15px);
            transform: translateY(30px);
            animation: reveal 1s ease forwards;
        }
        @keyframes reveal {
            0% {
                opacity: 0;
                filter:blur(15px);
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }
        #header {animation-delay: 0.3s;}
        #socials_text {animation-delay: 0.2s;}
    </style>
</head>
<body>
    <div id="text"> 
        <p id="header" class="anim">
            <span id="name">
                <a href="home.html"> osaid hassan</a>
            </span>
            <span id="home">
                <a href="home.html"> back</a>
            </span>
        </p>
        <p id="socials_text" class="anim">socials yet to be added, i dont have a lot of them but i have some that i can share.</p>
    </div>
</body>
</html>
